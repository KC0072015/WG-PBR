services:
  router:
    build: ./router
    container_name: pbr-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    devices:
      - /dev/net/tun
    ports:
      - "${WG_PORT:-51822}:51822/udp"
    volumes:
      # Secret configs — stored on the NAS at SECRETS_PATH, NOT in Git
      - "${SECRETS_PATH}/wg0-server.conf:/etc/wireguard/wg0.conf:ro"
      - "${SECRETS_PATH}/surfshark.conf:/etc/wireguard/wg1.conf:ro"
      # Domain list — lives in the Git repo, edit & push to update routing
      - ./config/domains.txt:/etc/pbr/domains.txt:ro
    environment:
      - WG_SERVER_SUBNET=${WG_SERVER_SUBNET:-10.8.0.0/24}
      - WG_SERVER_IP=${WG_SERVER_IP:-10.8.0.1}
      - INTERNAL_DNS_IP=${INTERNAL_DNS_IP:-10.0.1.15}
